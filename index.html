<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="todo-card p-4 shadow">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>🚀 Pro Tasks</h4>
      <button class="btn btn-sm btn-dark" onclick="toggleDarkMode()">🌙</button>
    </div>

    <!-- Input -->
    <div class="input-group mb-2">
      <input type="text" id="taskInput" class="form-control" placeholder="Add task...">
      <input type="date" id="dueDate" class="form-control">
      <button class="btn btn-primary" onclick="addTask()">Add</button>
    </div>

    <!-- Search -->
    <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search..." onkeyup="displayTasks()">

    <!-- Filters -->
    <div class="btn-group mb-3 w-100">
      <button class="btn btn-outline-secondary" onclick="setFilter('all')">All</button>
      <button class="btn btn-outline-success" onclick="setFilter('completed')">Completed</button>
      <button class="btn btn-outline-warning" onclick="setFilter('pending')">Pending</button>
    </div>

    <!-- Progress -->
    <div class="mb-3">
      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <small id="progressText"></small>
    </div>

    <!-- Task List -->
    <ul id="taskList" class="list-group"></ul>

  </div>
</div>

<!-- 🔊 Sound -->
<audio id="alertSound">
  <source src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3">
</audio>

<!-- 🪟 Popup -->
<div id="popup" class="popup hidden"></div>


</body>
</html>
